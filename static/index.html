<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebRTC Stream</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0f;
      --surface: #111118;
      --border:  #222230;
      --accent:  #00e5ff;
      --accent2: #7b61ff;
      --text:    #e0e0f0;
      --muted:   #555570;
      --ok:      #00e676;
      --err:     #ff1744;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px 16px;
    }

    /* ── Header ── */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.08em;
    }

    /* ── Video card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      width: 100%;
      max-width: 900px;
      position: relative;
    }

    /* corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 8px 0 0 0; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 8px 0; }

    video {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 4px;
      display: block;
      object-fit: cover;
    }

    /* ── Status bar ── */
    .status {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      padding: 6px 12px;
      border-radius: 4px;
      letter-spacing: 0.06em;
      border-left: 3px solid var(--muted);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      transition: all 0.25s;
      width: 100%;
      max-width: 900px;
    }
    .status.info  { border-color: var(--accent);  color: var(--accent);  }
    .status.ok    { border-color: var(--ok);   color: var(--ok);   }
    .status.error { border-color: var(--err);  color: var(--err);  }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 12px;
    }

    button {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 28px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    button:not(:disabled):active { transform: scale(0.97); }

    #startBtn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
    }
    #stopBtn {
      background: transparent;
      border: 1px solid var(--err);
      color: var(--err);
    }
    #stopBtn:not(:disabled):hover { background: rgba(255,23,68,0.1); }
  </style>
</head>
<body>

  <header>
    <h1>WebRTC Stream</h1>
    <p>WebSocket Signaling · aiortc · aiohttp</p>
  </header>

  <div class="card">
    <video id="remoteVideo" autoplay playsinline muted></video>
  </div>

  <p id="status" class="status">Prêt — cliquez sur Start</p>

  <div class="controls">
    <button id="startBtn">▶ Start</button>
    <button id="stopBtn" disabled>■ Stop</button>
  </div>

  <script src="/static/WEBmain.js"></script>
</body>
</html>
